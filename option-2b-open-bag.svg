<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg2b" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <linearGradient id="pack2b" x1="15%" y1="5%" x2="85%" y2="95%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="pcb2b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#134E4A"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg2b)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1E3A5F" stroke-width="0.6" opacity="0.5">
    <line x1="20" y1="40"  x2="180" y2="40"/>  <line x1="20" y1="70"  x2="180" y2="70"/>
    <line x1="20" y1="100" x2="180" y2="100"/> <line x1="20" y1="130" x2="180" y2="130"/>
    <line x1="20" y1="160" x2="180" y2="160"/>
    <line x1="40"  y1="20" x2="40"  y2="180"/> <line x1="70"  y1="20" x2="70"  y2="180"/>
    <line x1="100" y1="20" x2="100" y2="180"/> <line x1="130" y1="20" x2="130" y2="180"/>
    <line x1="160" y1="20" x2="160" y2="180"/>
  </g>

  <!-- ===== OPEN BAG: no arch, clear opening ===== -->

  <!-- Bag body (straight-sided, rounded bottom, open top) -->
  <path d="M 62,82 L 62,174 Q 62,180 68,180 L 132,180 Q 138,180 138,174 L 138,82 Z"
        fill="url(#pack2b)"/>

  <!-- Right-side depth shading -->
  <path d="M 128,82 L 138,82 L 138,174 Q 138,180 132,180 L 128,180 Z"
        fill="#0369A1" opacity="0.40"/>

  <!-- Bag opening collar — defines the open mouth clearly -->
  <rect x="60" y="68" width="80" height="18" rx="9" fill="#0369A1"/>

  <!-- Inside of bag visible at opening (PCB board peeking out) -->
  <rect x="68" y="56" width="64" height="30" rx="4" fill="#14532D"/>
  <!-- PCB pins/leads visible sticking up from board -->
  <g stroke="#34D399" stroke-width="2" stroke-linecap="round">
    <line x1="78"  y1="56" x2="78"  y2="48"/>
    <line x1="88"  y1="56" x2="88"  y2="44"/>
    <line x1="100" y1="56" x2="100" y2="42"/>
    <line x1="112" y1="56" x2="112" y2="44"/>
    <line x1="122" y1="56" x2="122" y2="48"/>
  </g>
  <!-- PCB trace across the board top -->
  <line x1="78" y1="60" x2="122" y2="60" stroke="#10B981" stroke-width="1.5"/>
  <!-- Vias on board -->
  <g fill="#34D399">
    <circle cx="78"  cy="60" r="2.5"/>
    <circle cx="100" cy="60" r="2.5"/>
    <circle cx="122" cy="60" r="2.5"/>
  </g>

  <!-- Carry handle (sits above collar) -->
  <path d="M 85,58 C 85,38 115,38 115,58" fill="none" stroke="#0369A1" stroke-width="9" stroke-linecap="round"/>

  <!-- Seam line: divides bag into upper and lower sections -->
  <path d="M 64,104 Q 100,98 136,104" stroke="#BAE6FD" stroke-width="1.5" fill="none"
        stroke-linecap="round" opacity="0.5"/>

  <!-- Front pocket — PCB board -->
  <rect x="68" y="120" width="64" height="54" rx="8" fill="url(#pcb2b)" stroke="#064E3B" stroke-width="1.5"/>

  <!-- PCB corner vias -->
  <g fill="#34D399" opacity="0.9">
    <circle cx="76" cy="128" r="2.5"/>  <circle cx="124" cy="128" r="2.5"/>
    <circle cx="76" cy="167" r="2.5"/>  <circle cx="124" cy="167" r="2.5"/>
  </g>

  <!-- Circuit traces on pocket -->
  <g stroke="#10B981" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="76" y1="128" x2="124" y2="128"/>
    <line x1="76" y1="167" x2="124" y2="167"/>
    <line x1="76" y1="128" x2="76" y2="167"/>
    <line x1="124" y1="128" x2="124" y2="167"/>
    <line x1="86" y1="128" x2="86" y2="138"/>   <line x1="86" y1="138" x2="96" y2="138"/>
    <line x1="114" y1="128" x2="114" y2="138"/>  <line x1="114" y1="138" x2="104" y2="138"/>
    <line x1="86" y1="167" x2="86" y2="157"/>    <line x1="86" y1="157" x2="96" y2="157"/>
    <line x1="114" y1="167" x2="114" y2="157"/>  <line x1="114" y1="157" x2="104" y2="157"/>
  </g>

  <!-- IC chip on pocket -->
  <rect x="93" y="138" width="14" height="19" rx="2" fill="#065F46" stroke="#34D399" stroke-width="1.2"/>
  <text x="100" y="150" font-family="monospace" font-size="5.5" fill="#6EE7B7" text-anchor="middle">IC</text>

  <!-- Junction vias -->
  <g fill="#34D399">
    <circle cx="86" cy="138" r="2"/>  <circle cx="114" cy="138" r="2"/>
    <circle cx="86" cy="157" r="2"/>  <circle cx="114" cy="157" r="2"/>
    <circle cx="96" cy="138" r="1.5"/> <circle cx="104" cy="138" r="1.5"/>
    <circle cx="96" cy="157" r="1.5"/> <circle cx="104" cy="157" r="1.5"/>
  </g>

  <!-- EDAPack text on bag body -->
  <text x="100" y="114" font-family="'Arial Narrow', Arial, sans-serif" font-size="15"
        font-weight="bold" fill="#F0F9FF" text-anchor="middle" letter-spacing="1.5">EDAPack</text>
</svg>
