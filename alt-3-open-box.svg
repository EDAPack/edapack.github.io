<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!--
    Concept: an open box/crate (like a package being opened/delivered),
    interior shows a PCB circuit board. "Pack" = package/shipment of EDA tools.
  -->
  <defs>
    <radialGradient id="bgAlt3" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <linearGradient id="boxFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="boxTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="boxSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="pcbAlt3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#14532D"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgAlt3)"/>

  <!-- Subtle grid -->
  <g stroke="#1E3A5F" stroke-width="0.6" opacity="0.5">
    <line x1="20" y1="40"  x2="180" y2="40"/>  <line x1="20" y1="70"  x2="180" y2="70"/>
    <line x1="20" y1="100" x2="180" y2="100"/> <line x1="20" y1="130" x2="180" y2="130"/>
    <line x1="20" y1="160" x2="180" y2="160"/>
    <line x1="40"  y1="20" x2="40"  y2="180"/> <line x1="70"  y1="20" x2="70"  y2="180"/>
    <line x1="100" y1="20" x2="100" y2="180"/> <line x1="130" y1="20" x2="130" y2="180"/>
    <line x1="160" y1="20" x2="160" y2="180"/>
  </g>

  <!-- ===== ISOMETRIC OPEN BOX ===== -->
  <!-- Box sitting slightly left-center; isometric-ish projection         -->
  <!-- Bottom box face: x=38-148, y=108-168 (front face, slight trapezoid) -->
  <!-- Right side face: x=148-168, y=90-168 (trapezoid side)             -->
  <!-- Inside visible from open top                                        -->

  <!-- Box interior / inside bottom (PCB) — drawn first -->
  <polygon points="46,100 148,100 148,110 46,110" fill="url(#pcbAlt3)"/>
  <!-- PCB inside visible from top -->
  <rect x="52" y="72" width="90" height="38" rx="4" fill="url(#pcbAlt3)"/>

  <!-- PCB traces inside the box -->
  <g stroke="#10B981" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="62" y1="76" x2="62" y2="106"/>
    <line x1="62" y1="76" x2="80" y2="76"/>
    <line x1="62" y1="91" x2="75" y2="91"/>
    <line x1="130" y1="76" x2="130" y2="106"/>
    <line x1="130" y1="76" x2="112" y2="76"/>
    <line x1="130" y1="91" x2="117" y2="91"/>
    <line x1="62" y1="106" x2="80" y2="106"/>
    <line x1="130" y1="106" x2="112" y2="106"/>
  </g>
  <!-- Central IC chip inside box -->
  <rect x="86" y="80" width="28" height="20" rx="3" fill="#052E16" stroke="#34D399" stroke-width="1.5"/>
  <!-- IC pins -->
  <g stroke="#34D399" stroke-width="1.5" stroke-linecap="round">
    <line x1="86" y1="85" x2="80" y2="85"/>
    <line x1="86" y1="90" x2="80" y2="90"/>
    <line x1="86" y1="95" x2="80" y2="95"/>
    <line x1="114" y1="85" x2="120" y2="85"/>
    <line x1="114" y1="90" x2="120" y2="90"/>
    <line x1="114" y1="95" x2="120" y2="95"/>
  </g>
  <text x="100" y="93" font-family="monospace" font-size="6" fill="#34D399" text-anchor="middle">EDA</text>
  <!-- PCB vias -->
  <g fill="#34D399">
    <circle cx="62"  cy="76"  r="2.5"/>  <circle cx="130" cy="76"  r="2.5"/>
    <circle cx="62"  cy="106" r="2.5"/>  <circle cx="130" cy="106" r="2.5"/>
    <circle cx="75"  cy="91"  r="2"/>    <circle cx="117" cy="91"  r="2"/>
    <circle cx="80"  cy="76"  r="1.8"/>  <circle cx="112" cy="76"  r="1.8"/>
    <circle cx="80"  cy="106" r="1.8"/>  <circle cx="112" cy="106" r="1.8"/>
  </g>

  <!-- Box right side face -->
  <polygon points="148,72 168,86 168,168 148,156" fill="url(#boxSide)"/>
  <!-- Side panel edge highlight -->
  <line x1="148" y1="72" x2="168" y2="86" stroke="#3B82F6" stroke-width="1.2" opacity="0.5"/>

  <!-- Box front face -->
  <polygon points="46,110 148,110 148,156 46,156" fill="url(#boxFront)"/>
  <!-- Front face bottom edge -->
  <line x1="46" y1="156" x2="148" y2="156" stroke="#93C5FD" stroke-width="1" opacity="0.4"/>

  <!-- Box bottom face (isometric bottom) -->
  <polygon points="46,156 148,156 168,168 66,168" fill="#172554"/>

  <!-- Box top rim / opening edge (front) -->
  <line x1="46" y1="110" x2="148" y2="110" stroke="#60A5FA" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Box top right opening edge -->
  <line x1="148" y1="72" x2="148" y2="110" stroke="#60A5FA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="168" y1="86" x2="168" y2="168" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>

  <!-- Open flap (lid) — angled back, open -->
  <!-- Left flap: hinges on the back-left of the box top, fanning out upward-left -->
  <polygon points="46,72 148,72 148,110 46,110" fill="none" stroke="#60A5FA" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6"/>

  <!-- Left wall of open box -->
  <line x1="46" y1="72" x2="46" y2="156" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>

  <!-- "EDAPack" label on front face -->
  <text x="97" y="136" font-family="'Arial Narrow', Arial, sans-serif" font-size="14"
        font-weight="bold" fill="#BFDBFE" text-anchor="middle" letter-spacing="1.5">EDAPack</text>

  <!-- Tape stripe on front (delivery box feel) -->
  <line x1="97" y1="110" x2="97" y2="156" stroke="#DBEAFE" stroke-width="5" opacity="0.15"/>
</svg>
