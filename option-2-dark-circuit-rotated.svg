<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad2" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <linearGradient id="packGrad2" x1="15%" y1="5%" x2="85%" y2="95%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="pcbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#134E4A"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad2)"/>

  <!-- Subtle grid lines (PCB feel) -->
  <g stroke="#1E3A5F" stroke-width="0.6" opacity="0.6">
    <line x1="20" y1="40"  x2="180" y2="40"/>
    <line x1="20" y1="70"  x2="180" y2="70"/>
    <line x1="20" y1="100" x2="180" y2="100"/>
    <line x1="20" y1="130" x2="180" y2="130"/>
    <line x1="20" y1="160" x2="180" y2="160"/>
    <line x1="40"  y1="20" x2="40"  y2="180"/>
    <line x1="70"  y1="20" x2="70"  y2="180"/>
    <line x1="100" y1="20" x2="100" y2="180"/>
    <line x1="130" y1="20" x2="130" y2="180"/>
    <line x1="160" y1="20" x2="160" y2="180"/>
  </g>

  <!-- Backpack — rotated ~4 degrees clockwise around pack centre -->
  <g transform="rotate(4, 100, 120)">

    <!-- Shoulder straps -->
    <path d="M 68,93 C 46,112 40,148 46,174" stroke="#0369A1" stroke-width="13" fill="none" stroke-linecap="round"/>
    <path d="M 132,93 C 154,112 160,148 154,174" stroke="#0369A1" stroke-width="13" fill="none" stroke-linecap="round"/>

    <!-- Handle -->
    <path d="M 87,50 C 87,30 113,30 113,50" fill="none" stroke="#0369A1" stroke-width="9" stroke-linecap="round"/>

    <!-- Main pack body -->
    <path d="M 58,92 C 58,44 142,44 142,92 L 142,172 Q 142,178 135,178 L 65,178 Q 58,178 58,172 Z"
          fill="url(#packGrad2)"/>

    <!-- Right-edge depth shadow -->
    <path d="M 128,92 C 136,62 142,74 142,92 L 142,172 Q 142,178 135,178 L 128,178 Z"
          fill="#0369A1" opacity="0.40"/>

    <!-- Top seam -->
    <path d="M 60,101 Q 100,95 140,101" stroke="#BAE6FD" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>

    <!-- PCB / circuit board pocket -->
    <rect x="68" y="125" width="64" height="50" rx="8" fill="url(#pcbGrad)" stroke="#064E3B" stroke-width="1.5"/>

    <!-- PCB vias (dots) -->
    <g fill="#34D399" opacity="0.9">
      <circle cx="76" cy="133" r="2.5"/>
      <circle cx="124" cy="133" r="2.5"/>
      <circle cx="76" cy="168" r="2.5"/>
      <circle cx="124" cy="168" r="2.5"/>
    </g>

    <!-- Circuit traces on pocket -->
    <g stroke="#10B981" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Horizontal bus lines -->
      <line x1="76" y1="133" x2="124" y2="133"/>
      <line x1="76" y1="168" x2="124" y2="168"/>
      <!-- Left vertical -->
      <line x1="76" y1="133" x2="76" y2="168"/>
      <!-- Right vertical -->
      <line x1="124" y1="133" x2="124" y2="168"/>
      <!-- Internal traces -->
      <line x1="86" y1="133" x2="86" y2="143"/>
      <line x1="86" y1="143" x2="96" y2="143"/>
      <line x1="114" y1="133" x2="114" y2="143"/>
      <line x1="114" y1="143" x2="104" y2="143"/>
      <line x1="86" y1="168" x2="86" y2="158"/>
      <line x1="86" y1="158" x2="96" y2="158"/>
      <line x1="114" y1="168" x2="114" y2="158"/>
      <line x1="114" y1="158" x2="104" y2="158"/>
    </g>

    <!-- Central IC chip on PCB -->
    <rect x="93" y="143" width="14" height="15" rx="2" fill="#065F46" stroke="#34D399" stroke-width="1.2"/>
    <text x="100" y="154" font-family="monospace" font-size="5.5" fill="#6EE7B7" text-anchor="middle">IC</text>

    <!-- Internal via dots -->
    <g fill="#34D399">
      <circle cx="86" cy="143" r="2"/>
      <circle cx="114" cy="143" r="2"/>
      <circle cx="86" cy="158" r="2"/>
      <circle cx="114" cy="158" r="2"/>
      <circle cx="96" cy="143" r="1.5"/>
      <circle cx="104" cy="143" r="1.5"/>
      <circle cx="96" cy="158" r="1.5"/>
      <circle cx="104" cy="158" r="1.5"/>
    </g>

    <!-- EDAPack text on body -->
    <text x="100" y="118" font-family="'Arial Narrow', Arial, sans-serif" font-size="15"
          font-weight="bold" fill="#F0F9FF" text-anchor="middle" letter-spacing="1.5">EDAPack</text>

    <!-- Top highlight -->
    <path d="M 68,92 C 68,62 132,62 132,92" stroke="white" stroke-width="1.2" fill="none" opacity="0.30" stroke-linecap="round"/>

  </g>
</svg>
