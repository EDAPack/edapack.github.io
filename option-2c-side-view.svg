<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg2c" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <linearGradient id="packBody2c" x1="10%" y1="5%" x2="90%" y2="95%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="packBack2c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0369A1"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>
    <linearGradient id="pcb2c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#134E4A"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg2c)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1E3A5F" stroke-width="0.6" opacity="0.5">
    <line x1="20" y1="40"  x2="180" y2="40"/>  <line x1="20" y1="70"  x2="180" y2="70"/>
    <line x1="20" y1="100" x2="180" y2="100"/> <line x1="20" y1="130" x2="180" y2="130"/>
    <line x1="20" y1="160" x2="180" y2="160"/>
    <line x1="40"  y1="20" x2="40"  y2="180"/> <line x1="70"  y1="20" x2="70"  y2="180"/>
    <line x1="100" y1="20" x2="100" y2="180"/> <line x1="130" y1="20" x2="130" y2="180"/>
    <line x1="160" y1="20" x2="160" y2="180"/>
  </g>

  <!-- ===== SIDE-PROFILE BACKPACK ===== -->
  <!-- Viewed from the left; back panel on right, front face on left, top visible -->

  <!-- Bag back panel (right side, vertical) -->
  <path d="M 120,50 Q 128,50 130,58 L 130,168 Q 130,175 122,175 L 110,175 L 110,50 Z"
        fill="url(#packBack2c)"/>

  <!-- Main bag body (the front/visible face) -->
  <path d="M 70,65 Q 70,50 90,50 L 120,50 L 120,175 L 80,175 Q 70,175 70,165 Z"
        fill="url(#packBody2c)"/>

  <!-- Top face (top of bag, foreshortened) -->
  <path d="M 70,65 Q 70,50 90,50 L 120,50 L 130,58 L 115,62 Q 100,66 70,65 Z"
        fill="#BAE6FD" opacity="0.30"/>

  <!-- Shoulder strap: S-curve from top of back panel, over top, down the front -->
  <!-- This is the classic backpack side-profile strap shape -->
  <path d="M 126,62 C 140,70 145,95 135,118 C 125,140 108,155 100,170"
        fill="none" stroke="#0369A1" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Strap top attachment to bag -->
  <circle cx="126" cy="62" r="6" fill="#0369A1"/>
  <!-- Strap bottom (hip buckle) -->
  <circle cx="100" cy="170" r="5" fill="#0369A1"/>

  <!-- Top carry handle -->
  <path d="M 108,50 C 108,34 124,34 124,50" fill="none" stroke="#075985" stroke-width="8" stroke-linecap="round"/>

  <!-- Front face pocket (PCB circuit) — lower portion of front face -->
  <rect x="74" y="118" width="42" height="48" rx="7" fill="url(#pcb2c)" stroke="#064E3B" stroke-width="1.5"/>

  <!-- PCB corner vias -->
  <g fill="#34D399" opacity="0.9">
    <circle cx="80"  cy="125" r="2.2"/>  <circle cx="110" cy="125" r="2.2"/>
    <circle cx="80"  cy="160" r="2.2"/>  <circle cx="110" cy="160" r="2.2"/>
  </g>

  <!-- Circuit traces on pocket -->
  <g stroke="#10B981" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="80" y1="125" x2="110" y2="125"/>
    <line x1="80" y1="160" x2="110" y2="160"/>
    <line x1="80" y1="125" x2="80"  y2="160"/>
    <line x1="110" y1="125" x2="110" y2="160"/>
    <line x1="88" y1="125" x2="88"  y2="133"/>  <line x1="88" y1="133" x2="95" y2="133"/>
    <line x1="102" y1="125" x2="102" y2="133"/> <line x1="102" y1="133" x2="95" y2="133"/>
    <line x1="88" y1="160" x2="88"  y2="152"/>  <line x1="88" y1="152" x2="95" y2="152"/>
    <line x1="102" y1="160" x2="102" y2="152"/> <line x1="102" y1="152" x2="95" y2="152"/>
  </g>
  <!-- IC chip on pocket -->
  <rect x="89" y="133" width="12" height="19" rx="2" fill="#065F46" stroke="#34D399" stroke-width="1.2"/>
  <g fill="#34D399">
    <circle cx="88" cy="133" r="1.8"/>  <circle cx="102" cy="133" r="1.8"/>
    <circle cx="88" cy="152" r="1.8"/>  <circle cx="102" cy="152" r="1.8"/>
    <circle cx="95" cy="133" r="1.4"/>  <circle cx="95" cy="152" r="1.4"/>
  </g>

  <!-- EDAPack text — on the front face -->
  <text x="91" y="108" font-family="'Arial Narrow', Arial, sans-serif" font-size="12"
        font-weight="bold" fill="#F0F9FF" text-anchor="middle" letter-spacing="1"
        transform="rotate(-3,91,108)">EDAPack</text>

  <!-- Top face highlight -->
  <path d="M 72,65 Q 95,60 118,52" stroke="white" stroke-width="1" fill="none" opacity="0.25"/>
</svg>
