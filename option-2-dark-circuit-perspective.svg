<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad2" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <!-- Front face: slightly narrower gradient (x1 same, x2 pulls left) -->
    <linearGradient id="packGrad2" x1="15%" y1="5%" x2="82%" y2="95%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <!-- Right side face: darker blue -->
    <linearGradient id="sideGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0264A0"/>
      <stop offset="100%" stop-color="#014E82"/>
    </linearGradient>
    <linearGradient id="pcbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#134E4A"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad2)"/>

  <!-- Subtle grid lines (PCB feel) -->
  <g stroke="#1E3A5F" stroke-width="0.6" opacity="0.6">
    <line x1="20" y1="40"  x2="180" y2="40"/>
    <line x1="20" y1="70"  x2="180" y2="70"/>
    <line x1="20" y1="100" x2="180" y2="100"/>
    <line x1="20" y1="130" x2="180" y2="130"/>
    <line x1="20" y1="160" x2="180" y2="160"/>
    <line x1="40"  y1="20" x2="40"  y2="180"/>
    <line x1="70"  y1="20" x2="70"  y2="180"/>
    <line x1="100" y1="20" x2="100" y2="180"/>
    <line x1="130" y1="20" x2="130" y2="180"/>
    <line x1="160" y1="20" x2="160" y2="180"/>
  </g>

  <!-- ── Right side face (visible because of Y-rotation) ───────────────── -->
  <!-- Drawn first so front body covers its left edge cleanly -->
  <!-- Parallelogram: front-right edge → side-back edge, top to bottom     -->
  <!-- Slight perspective: top extends a little more than bottom            -->
  <path d="M 136,44 L 148,50 L 148,175 Q 148,181 141,181 L 136,178 Z"
        fill="url(#sideGrad)" opacity="0.95"/>

  <!-- Right side depth edge highlight (top rim) -->
  <path d="M 136,44 L 148,50" stroke="#62B8E0" stroke-width="1" opacity="0.5" fill="none"/>

  <!-- Shoulder straps -->
  <!-- Left strap: same as original -->
  <path d="M 66,93 C 44,112 38,148 44,174" stroke="#0369A1" stroke-width="13" fill="none" stroke-linecap="round"/>
  <!-- Right strap: shifted right to wrap around the visible right side -->
  <path d="M 134,93 C 156,112 162,148 156,176" stroke="#0369A1" stroke-width="13" fill="none" stroke-linecap="round"/>

  <!-- Handle — right end extends past body edge to show 3D depth -->
  <path d="M 87,50 C 87,30 115,30 120,52" fill="none" stroke="#0369A1" stroke-width="9" stroke-linecap="round"/>

  <!-- Main pack body (front face — right edge pulled in to x=136) -->
  <path d="M 58,92 C 58,44 136,44 136,92 L 136,173 Q 136,179 129,179 L 65,179 Q 58,179 58,173 Z"
        fill="url(#packGrad2)"/>

  <!-- Right-edge depth shadow on front face -->
  <path d="M 124,92 C 130,62 136,74 136,92 L 136,173 Q 136,179 129,179 L 124,179 Z"
        fill="#0369A1" opacity="0.40"/>

  <!-- Top seam (compressed to match narrower right) -->
  <path d="M 60,101 Q 97,95 134,101" stroke="#BAE6FD" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- PCB / circuit board pocket (slightly narrower to fit front face) -->
  <rect x="67" y="125" width="58" height="50" rx="8" fill="url(#pcbGrad)" stroke="#064E3B" stroke-width="1.5"/>

  <!-- PCB vias (corner dots) -->
  <g fill="#34D399" opacity="0.9">
    <circle cx="75"  cy="133" r="2.5"/>
    <circle cx="117" cy="133" r="2.5"/>
    <circle cx="75"  cy="168" r="2.5"/>
    <circle cx="117" cy="168" r="2.5"/>
  </g>

  <!-- Circuit traces on pocket -->
  <g stroke="#10B981" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="75"  y1="133" x2="117" y2="133"/>
    <line x1="75"  y1="168" x2="117" y2="168"/>
    <line x1="75"  y1="133" x2="75"  y2="168"/>
    <line x1="117" y1="133" x2="117" y2="168"/>
    <!-- Internal traces -->
    <line x1="84"  y1="133" x2="84"  y2="143"/>
    <line x1="84"  y1="143" x2="93"  y2="143"/>
    <line x1="108" y1="133" x2="108" y2="143"/>
    <line x1="108" y1="143" x2="99"  y2="143"/>
    <line x1="84"  y1="168" x2="84"  y2="158"/>
    <line x1="84"  y1="158" x2="93"  y2="158"/>
    <line x1="108" y1="168" x2="108" y2="158"/>
    <line x1="108" y1="158" x2="99"  y2="158"/>
  </g>

  <!-- Central IC chip on PCB -->
  <rect x="90" y="143" width="14" height="15" rx="2" fill="#065F46" stroke="#34D399" stroke-width="1.2"/>
  <text x="97" y="154" font-family="monospace" font-size="5.5" fill="#6EE7B7" text-anchor="middle">IC</text>

  <!-- Internal via dots -->
  <g fill="#34D399">
    <circle cx="84" cy="143" r="2"/>
    <circle cx="108" cy="143" r="2"/>
    <circle cx="84" cy="158" r="2"/>
    <circle cx="108" cy="158" r="2"/>
    <circle cx="93" cy="143" r="1.5"/>
    <circle cx="99" cy="143" r="1.5"/>
    <circle cx="93" cy="158" r="1.5"/>
    <circle cx="99" cy="158" r="1.5"/>
  </g>

  <!-- EDAPack text on body -->
  <text x="97" y="118" font-family="'Arial Narrow', Arial, sans-serif" font-size="15"
        font-weight="bold" fill="#F0F9FF" text-anchor="middle" letter-spacing="1.5">EDAPack</text>

  <!-- Top highlight -->
  <path d="M 68,92 C 68,62 130,62 130,92" stroke="white" stroke-width="1.2" fill="none" opacity="0.30" stroke-linecap="round"/>
</svg>
