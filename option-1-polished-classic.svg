<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad1" cx="42%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </radialGradient>
    <linearGradient id="packGrad1" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="pocketGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow1" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1E3A8A" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad1)"/>

  <!-- Shoulder straps (behind pack body) -->
  <path d="M 68,93 C 46,112 40,148 46,172" stroke="#78350F" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M 132,93 C 154,112 160,148 154,172" stroke="#78350F" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Handle loop (drawn before body so body overlaps base) -->
  <path d="M 87,50 C 87,30 113,30 113,50" fill="none" stroke="#92400E" stroke-width="9" stroke-linecap="round"/>

  <!-- Main backpack body: arch top + rounded-bottom rectangle -->
  <path d="M 58,92 C 58,44 142,44 142,92 L 142,171 Q 142,178 135,178 L 65,178 Q 58,178 58,171 Z"
        fill="url(#packGrad1)" filter="url(#shadow1)"/>

  <!-- Right-side shading for depth -->
  <path d="M 130,92 C 138,60 142,72 142,92 L 142,171 Q 142,178 135,178 L 130,178 Z"
        fill="#B45309" opacity="0.30"/>

  <!-- Horizontal divider (top flap seam) -->
  <path d="M 60,100 Q 100,94 140,100" stroke="#B45309" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Front pocket -->
  <rect x="68" y="127" width="64" height="46" rx="9" fill="url(#pocketGrad1)"/>

  <!-- Pocket zipper line -->
  <path d="M 70,139 Q 100,135 130,139" stroke="#D97706" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Zipper pull -->
  <circle cx="100" cy="137" r="3" fill="#FBBF24"/>

  <!-- IC chip on pocket — EDA reference -->
  <g transform="translate(84,148)">
    <!-- Chip body -->
    <rect x="0" y="0" width="32" height="18" rx="3" fill="#D97706" stroke="#FBBF24" stroke-width="1"/>
    <!-- Pins left (3) -->
    <line x1="0" y1="4"  x2="-5" y2="4"  stroke="#FBBF24" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="0" y1="9"  x2="-5" y2="9"  stroke="#FBBF24" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="0" y1="14" x2="-5" y2="14" stroke="#FBBF24" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Pins right (3) -->
    <line x1="32" y1="4"  x2="37" y2="4"  stroke="#FBBF24" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="32" y1="9"  x2="37" y2="9"  stroke="#FBBF24" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="32" y1="14" x2="37" y2="14" stroke="#FBBF24" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Pin 1 dot -->
    <circle cx="4" cy="4" r="2" fill="#FBBF24"/>
    <!-- Chip label -->
    <text x="16" y="13" font-family="monospace" font-size="7" fill="#FBBF24" text-anchor="middle">EDA</text>
  </g>

  <!-- EDAPack text on body -->
  <text x="100" y="120" font-family="'Arial Narrow', Arial, sans-serif" font-size="15"
        font-weight="bold" fill="#7C2D12" text-anchor="middle" letter-spacing="1.5">EDAPack</text>

  <!-- Subtle top highlight -->
  <path d="M 68,92 C 68,62 132,62 132,92" stroke="white" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round"/>
</svg>
