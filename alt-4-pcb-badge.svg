<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!--
    Concept: a PCB (printed circuit board) cut to a hexagonal shape — like a PCB
    badge or quality seal. The whole icon IS a circuit board. "EDA" in the center.
    Very tech, very distinctive. Scales well.
  -->
  <defs>
    <radialGradient id="bgAlt4" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <radialGradient id="pcbBoardGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1A6B3C"/>
      <stop offset="100%" stop-color="#0D3D22"/>
    </radialGradient>
    <filter id="boardShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgAlt4)"/>

  <!-- Subtle outer grid -->
  <g stroke="#1E3A5F" stroke-width="0.6" opacity="0.3">
    <line x1="20" y1="40"  x2="180" y2="40"/>  <line x1="20" y1="70"  x2="180" y2="70"/>
    <line x1="20" y1="100" x2="180" y2="100"/> <line x1="20" y1="130" x2="180" y2="130"/>
    <line x1="20" y1="160" x2="180" y2="160"/>
    <line x1="40"  y1="20" x2="40"  y2="180"/> <line x1="70"  y1="20" x2="70"  y2="180"/>
    <line x1="100" y1="20" x2="100" y2="180"/> <line x1="130" y1="20" x2="130" y2="180"/>
    <line x1="160" y1="20" x2="160" y2="180"/>
  </g>

  <!-- ===== PCB HEXAGONAL BADGE ===== -->
  <!-- Hex: flat-top orientation, 78px radius -->
  <!-- Points: (100,22)(168,61)(168,139)(100,178)(32,139)(32,61) -->

  <!-- PCB board hex fill -->
  <polygon points="100,22 168,61 168,139 100,178 32,139 32,61"
           fill="url(#pcbBoardGrad)" filter="url(#boardShadow)"/>

  <!-- PCB board copper edge plating (border) -->
  <polygon points="100,22 168,61 168,139 100,178 32,139 32,61"
           fill="none" stroke="#D97706" stroke-width="3.5"/>

  <!-- Mounting holes at hex corners -->
  <g fill="#0D3D22" stroke="#D97706" stroke-width="2">
    <circle cx="100" cy="29" r="5"/>
    <circle cx="161" cy="65" r="5"/>
    <circle cx="161" cy="135" r="5"/>
    <circle cx="100" cy="171" r="5"/>
    <circle cx="39"  cy="135" r="5"/>
    <circle cx="39"  cy="65" r="5"/>
  </g>
  <!-- Hole centers -->
  <g fill="#0F172A">
    <circle cx="100" cy="29" r="2.5"/>
    <circle cx="161" cy="65" r="2.5"/>
    <circle cx="161" cy="135" r="2.5"/>
    <circle cx="100" cy="171" r="2.5"/>
    <circle cx="39"  cy="135" r="2.5"/>
    <circle cx="39"  cy="65" r="2.5"/>
  </g>

  <!-- PCB trace bus along inner hex edges -->
  <polygon points="100,38 152,67 152,133 100,162 48,133 48,67"
           fill="none" stroke="#D97706" stroke-width="1.5" opacity="0.6"/>

  <!-- Circuit traces across the board -->
  <g stroke="#D97706" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8">
    <!-- Horizontal main bus -->
    <line x1="50" y1="100" x2="150" y2="100"/>
    <!-- Vertical traces -->
    <line x1="70" y1="60" x2="70" y2="140"/>
    <line x1="100" y1="45" x2="100" y2="155"/>
    <line x1="130" y1="60" x2="130" y2="140"/>
    <!-- Cross traces -->
    <line x1="70"  y1="78"  x2="85"  y2="78"/>
    <line x1="115" y1="78"  x2="130" y2="78"/>
    <line x1="70"  y1="122" x2="85"  y2="122"/>
    <line x1="115" y1="122" x2="130" y2="122"/>
    <!-- Corner curves (45° jogs) -->
    <polyline points="50,100 60,88 70,78"/>
    <polyline points="50,100 60,112 70,122"/>
    <polyline points="150,100 140,88 130,78"/>
    <polyline points="150,100 140,112 130,122"/>
  </g>

  <!-- Via dots at intersections -->
  <g fill="#F59E0B">
    <circle cx="70"  cy="100" r="3.5"/>
    <circle cx="100" cy="100" r="3.5"/>
    <circle cx="130" cy="100" r="3.5"/>
    <circle cx="70"  cy="78"  r="3"/>
    <circle cx="70"  cy="122" r="3"/>
    <circle cx="130" cy="78"  r="3"/>
    <circle cx="130" cy="122" r="3"/>
    <circle cx="85"  cy="78"  r="2.5"/>
    <circle cx="85"  cy="122" r="2.5"/>
    <circle cx="115" cy="78"  r="2.5"/>
    <circle cx="115" cy="122" r="2.5"/>
  </g>

  <!-- Central IC chip (the hero component) -->
  <rect x="82" y="84" width="36" height="32" rx="4" fill="#0A2E18" stroke="#34D399" stroke-width="2"/>
  <!-- IC pins top -->
  <g fill="#34D399">
    <rect x="88" y="79" width="6" height="7" rx="1.5"/>
    <rect x="99" y="79" width="6" height="7" rx="1.5"/>
    <rect x="110" y="79" width="6" height="7" rx="1.5"/>
    <!-- IC pins bottom -->
    <rect x="88" y="114" width="6" height="7" rx="1.5"/>
    <rect x="99" y="114" width="6" height="7" rx="1.5"/>
    <rect x="110" y="114" width="6" height="7" rx="1.5"/>
  </g>
  <!-- Notch on IC -->
  <path d="M 92,84 Q 100,78 108,84" fill="#0F172A" stroke="#34D399" stroke-width="1.2"/>
  <!-- Pin 1 marker -->
  <circle cx="86" cy="89" r="2.5" fill="#34D399"/>

  <!-- EDA text on chip -->
  <text x="100" y="98" font-family="'Arial Narrow', Arial, sans-serif" font-size="11"
        font-weight="bold" fill="#34D399" text-anchor="middle" letter-spacing="1">EDA</text>
  <text x="100" y="109" font-family="monospace" font-size="7"
        fill="#6EE7B7" text-anchor="middle">pack</text>

  <!-- Silkscreen "EDAPack" label outside chip, on board -->
  <text x="100" y="148" font-family="monospace" font-size="9"
        fill="#D97706" text-anchor="middle" letter-spacing="2" opacity="0.8">EDAPack</text>

  <!-- Board version silkscreen text -->
  <text x="58" y="72" font-family="monospace" font-size="6"
        fill="#92400E" opacity="0.7">v1.0</text>
</svg>
