<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="hexGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="packWhite" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <filter id="hexShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E1B4B" flood-opacity="0.6"/>
    </filter>
    <clipPath id="hexClip">
      <!-- Hexagon clip -->
      <polygon points="100,8 183,54 183,146 100,192 17,146 17,54"/>
    </clipPath>
  </defs>

  <!-- Hexagon background -->
  <polygon points="100,8 183,54 183,146 100,192 17,146 17,54"
           fill="url(#hexGrad)" filter="url(#hexShadow)"/>

  <!-- Subtle inner hex ring -->
  <polygon points="100,18 173,59 173,141 100,182 27,141 27,59"
           fill="none" stroke="white" stroke-width="1" opacity="0.12"/>

  <!-- Content clipped to hexagon -->
  <g clip-path="url(#hexClip)">
    <!-- Shoulder straps (behind body) -->
    <path d="M 70,97 C 50,115 44,148 50,174" stroke="#94A3B8" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M 130,97 C 150,115 156,148 150,174" stroke="#94A3B8" stroke-width="12" fill="none" stroke-linecap="round"/>

    <!-- Handle -->
    <path d="M 88,54 C 88,36 112,36 112,54" fill="none" stroke="#94A3B8" stroke-width="8" stroke-linecap="round"/>

    <!-- Main pack body -->
    <path d="M 60,96 C 60,50 140,50 140,96 L 140,174 Q 140,180 134,180 L 66,180 Q 60,180 60,174 Z"
          fill="url(#packWhite)"/>

    <!-- Body right shading -->
    <path d="M 128,96 C 136,66 140,78 140,96 L 140,174 Q 140,180 134,180 L 128,180 Z"
          fill="#94A3B8" opacity="0.35"/>

    <!-- Top seam line -->
    <path d="M 62,104 Q 100,98 138,104" stroke="#94A3B8" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Front pocket — PCB green board -->
    <rect x="70" y="128" width="60" height="46" rx="8" fill="#14532D" stroke="#166534" stroke-width="1.5"/>

    <!-- PCB copper traces (simplified) -->
    <g stroke="#86EFAC" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Outer frame trace -->
      <rect x="75" y="133" width="50" height="36" rx="4" fill="none" stroke="#4ADE80" stroke-width="1.2"/>
      <!-- Internal traces -->
      <line x1="85" y1="133" x2="85" y2="141"/>
      <line x1="85" y1="141" x2="93" y2="141"/>
      <line x1="115" y1="133" x2="115" y2="141"/>
      <line x1="115" y1="141" x2="107" y2="141"/>
      <line x1="85" y1="169" x2="85" y2="161"/>
      <line x1="85" y1="161" x2="93" y2="161"/>
      <line x1="115" y1="169" x2="115" y2="161"/>
      <line x1="115" y1="161" x2="107" y2="161"/>
    </g>

    <!-- IC chip at pocket center -->
    <rect x="91" y="141" width="18" height="20" rx="3" fill="#052E16" stroke="#4ADE80" stroke-width="1.2"/>
    <!-- Chip pins left -->
    <line x1="91" y1="146" x2="86" y2="146" stroke="#86EFAC" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="91" y1="151" x2="86" y2="151" stroke="#86EFAC" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="91" y1="156" x2="86" y2="156" stroke="#86EFAC" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Chip pins right -->
    <line x1="109" y1="146" x2="114" y2="146" stroke="#86EFAC" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="109" y1="151" x2="114" y2="151" stroke="#86EFAC" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="109" y1="156" x2="114" y2="156" stroke="#86EFAC" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Pin 1 marker -->
    <circle cx="93" cy="144" r="1.5" fill="#4ADE80"/>
    <!-- Chip text -->
    <text x="100" y="154" font-family="monospace" font-size="6" fill="#4ADE80" text-anchor="middle">EDA</text>

    <!-- Via dots on pocket -->
    <g fill="#4ADE80">
      <circle cx="79" cy="137" r="2.2"/>
      <circle cx="121" cy="137" r="2.2"/>
      <circle cx="79" cy="165" r="2.2"/>
      <circle cx="121" cy="165" r="2.2"/>
    </g>

    <!-- EDAPack text on body -->
    <text x="100" y="120" font-family="'Arial Narrow', Arial, sans-serif" font-size="14"
          font-weight="bold" fill="#312E81" text-anchor="middle" letter-spacing="1.5">EDAPack</text>

    <!-- Top highlight arc -->
    <path d="M 70,96 C 70,66 130,66 130,96" stroke="white" stroke-width="1.5" fill="none" opacity="0.35" stroke-linecap="round"/>
  </g>

  <!-- Hex border highlight (top-left edge) -->
  <polyline points="100,8 183,54 183,90" fill="none" stroke="white" stroke-width="1.2" opacity="0.20" stroke-linecap="round"/>
</svg>
